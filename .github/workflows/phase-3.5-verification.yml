name: Phase-3.5 Verification

on:
  push:
  pull_request:

jobs:
  verify-phase35:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r nova_backend/src/requirements.txt

      - name: Run backend test suite
        run: |
          cd nova_backend
          python -m pytest -q

      - name: Enforce generated runtime docs
        run: |
          $env:PYTHONPATH = "nova_backend"
          python scripts/generate_runtime_docs.py
          git diff --exit-code -- `
            docs/current_runtime/CURRENT_RUNTIME_STATE.md `
            docs/current_runtime/GOVERNANCE_MATRIX.md `
            docs/current_runtime/GOVERNANCE_MATRIX_TREE.md `
            docs/current_runtime/SKILL_SURFACE_MAP.md `
            docs/current_runtime/BYPASS_SURFACES.md `
            docs/current_runtime/RUNTIME_FINGERPRINT.md

      - name: Validate dashboard JavaScript syntax
        run: |
          node --check nova_backend/static/dashboard.js
          node --check Nova-Frontend-Dashboard/dashboard.js
