name: Phase-3.5 Verification

on:
  push:
  pull_request:

jobs:
  verify-phase35:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r nova_backend/src/requirements.txt

      - name: Run backend test suite
        run: |
          cd nova_backend
          python -m pytest -q

      - name: Validate dashboard JavaScript syntax
        run: |
          node --check nova_backend/static/dashboard.js
          node --check Nova-Frontend-Dashboard/dashboard.js
