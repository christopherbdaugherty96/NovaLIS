name: CI

# Tier 1.4 basic CI: lint the Python source and run the pytest suite on
# every push / PR. Keep lightweight — deeper checks (runtime-doc drift,
# governance) live in their own workflows so a single failure doesn't
# mask the others.

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify nova-start entry point resolves
        # Smoke test: importing the target shouldn't error. We do not
        # launch uvicorn in CI — just confirm the console_script is wired
        # to something callable.
        run: |
          python -c "from src.brain_server import main; assert callable(main)"

      - name: Ruff lint
        run: |
          ruff check nova_backend/src

      - name: Pytest (backend)
        env:
          PYTHONPATH: nova_backend
        run: |
          pytest nova_backend/tests -q --maxfail=5

  # Windows job: verifies that the entry point resolves, adversarial suite
  # passes, and certification tests pass on the primary shipping platform.
  # Platform-specific executors (brightness, media, file system) need a live
  # Windows environment — this catches regressions that the ubuntu job cannot.
  #
  # The Windows job runs adversarial + certification suites only (not the full
  # suite). Reason: tests/simulation contains a pre-existing path-resolution
  # failure in test_nova_trial_runner that occurs when PYTHONPATH=nova_backend
  # is set, which is required for Windows entry-point imports. This failure
  # predates trust receipt and Cap 65 work and is unrelated to these changes.
  # The ubuntu job runs the full suite because the simulation pathing issue
  # does not reproduce there.
  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify nova-start entry point resolves
        run: |
          python -c "from src.brain_server import main; assert callable(main)"

      - name: Pytest — adversarial suite (Windows)
        env:
          PYTHONPATH: nova_backend
        run: |
          pytest nova_backend/tests/adversarial -q --tb=short

      - name: Pytest — certification suite (Windows)
        env:
          PYTHONPATH: nova_backend
        run: |
          pytest nova_backend/tests/certification -q --tb=short --maxfail=5
